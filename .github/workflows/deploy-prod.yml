name: Gamegoo Prod Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, macOS, ARM64, macmini]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Create env file
        run: |
          mkdir -p ~/apps/gamegoo/env
          cat > ~/apps/gamegoo/env/.env.prod <<EOF
          SPRING_PROFILES_ACTIVE=prod
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          RDS_PRIVATE_IP=${{ secrets.RDS_PRIVATE_IP }}
          RDS_PORT=${{ secrets.RDS_PORT }}
          PROD_DB_SCHEMA_NAME=${{ secrets.PROD_DB_SCHEMA_NAME }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          GMAIL_PWD=${{ secrets.GMAIL_PWD }}
          RIOT_API=${{ secrets.RIOT_API }}
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
          SOCKET_SERVER_URL=${{ secrets.SOCKET_SERVER_URL }}
          FRONT_URL=${{ secrets.FRONT_URL }}
          CLIENT_ID=${{ secrets.CLIENT_ID }}
          CLIENT_SECRET=${{ secrets.CLIENT_SECRET }}
          RSO_REDIRECT_URI=${{ secrets.PROD_RSO_REDIRECT_URI }}
          DISCORD_MONITORING_WEBHOOK_URL_PROD=${{ secrets.DISCORD_MONITORING_WEBHOOK_URL_PROD }}
          DISCORD_SCHEDULER_WEBHOOK=${{ secrets.DISCORD_SCHEDULER_WEBHOOK }}
          ADMIN_COMMON_PASSWORD=${{ secrets.ADMIN_COMMON_PASSWORD }}
          EOF

      - name: Prepare Docker config for CI
        run: |
          mkdir -p "$RUNNER_TEMP/docker-config"
          cat > "$RUNNER_TEMP/docker-config/config.json" <<EOF
          {
            "auths": {}
          }
          EOF

      - name: Stop old container
        run: |
          docker rm -f gamegoo-api-v2-prod || true

      - name: Build jar
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar

      - name: Build image
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/docker-config
        run: |
          docker build -t gamegoo-api-v2:prod -f Dockerfile-prod .

      - name: Run container
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/docker-config
        run: |
          docker run -d \
            -p 8080:8080 \
            --name gamegoo-api-v2-prod \
            --restart always \
            -v ~/apps/gamegoo/logs:/app/logs \
            --env-file ~/apps/gamegoo/env/.env.prod \
            gamegoo-api-v2:prod

      - name: Verify container is running
        run: |
          sleep 10
          docker ps
          docker logs --tail=200 gamegoo-api-v2-prod || true
          docker inspect gamegoo-api-v2-prod --format='{{.State.Status}} {{.State.ExitCode}} {{.State.Error}}'

      - name: Cleanup
        run: |
          docker image prune -f
